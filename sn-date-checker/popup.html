<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fafafa;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      margin-bottom: 12px;
      appearance: auto;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #scanBtn {
      background: #e53935;
      color: #fff;
      margin-bottom: 8px;
    }
    #scanBtn:hover { background: #c62828; }
    #scanBtn:disabled { background: #ccc; cursor: not-allowed; }
    #clearBtn {
      background: #eee;
      color: #555;
    }
    #clearBtn:hover { background: #ddd; }
    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    #status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    #status.error   { display: block; background: #ffebee; color: #c62828; }
    #status.info    { display: block; background: #e3f2fd; color: #1565c0; }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
    .help {
      font-size: 11px;
      color: #888;
      line-height: 1.4;
    }
    /* Issues list */
    #issuesList {
      max-height: 220px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .issue-row {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      background: #fff5f5;
      border-left: 3px solid #e53935;
    }
    .issue-found {
      font-weight: 600;
      color: #c62828;
      font-size: 13px;
      word-break: break-all;
    }
    .issue-found .wrong-date {
      background: #ffcdd2;
      padding: 1px 4px;
      border-radius: 3px;
      text-decoration: line-through;
      text-decoration-color: #e53935;
    }
    .issue-reason {
      font-size: 11px;
      color: #757575;
      margin-top: 2px;
    }
    .issue-expected {
      font-size: 12px;
      color: #2e7d32;
      margin-top: 3px;
      font-weight: 600;
    }
    .issue-expected .correct-date {
      background: #c8e6c9;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .issue-suggestion {
      margin-top: 5px;
      padding: 5px 8px;
      background: #e3f2fd;
      border: 1px solid #bbdefb;
      border-radius: 4px;
      font-size: 10px;
      line-height: 1.5;
      color: #0d47a1;
    }
    .issue-suggestion .suggestion-label {
      font-weight: 700;
      font-size: 10px;
      color: #1565c0;
      margin-bottom: 2px;
    }
    .issue-suggestion code {
      display: block;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10px;
      color: #1a237e;
      background: #e8eaf6;
      padding: 2px 5px;
      border-radius: 3px;
      margin-top: 2px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>🌐 SN Date Format Checker</h2>

  <label for="locale">Target Locale</label>
  <select id="locale">
    <optgroup label="East Asian">
      <option value="ja">Japanese (ja)</option>
      <option value="zh">Chinese Simplified (zh)</option>
      <option value="zh-Hant">Chinese Traditional (zh-Hant)</option>
      <option value="ko">Korean (ko)</option>
    </optgroup>
    <optgroup label="European">
      <option value="de">German (de)</option>
      <option value="fr">French (fr)</option>
      <option value="es">Spanish (es)</option>
      <option value="it">Italian (it)</option>
      <option value="pt">Portuguese (pt)</option>
      <option value="pt-BR">Portuguese Brazil (pt-BR)</option>
      <option value="nl">Dutch (nl)</option>
      <option value="pl">Polish (pl)</option>
      <option value="ru">Russian (ru)</option>
      <option value="sv">Swedish (sv)</option>
      <option value="fi">Finnish (fi)</option>
      <option value="nb">Norwegian (nb)</option>
      <option value="da">Danish (da)</option>
      <option value="cs">Czech (cs)</option>
      <option value="hu">Hungarian (hu)</option>
      <option value="ro">Romanian (ro)</option>
      <option value="el">Greek (el)</option>
      <option value="tr">Turkish (tr)</option>
      <option value="uk">Ukrainian (uk)</option>
    </optgroup>
    <optgroup label="Middle East & South Asia">
      <option value="ar">Arabic (ar)</option>
      <option value="he">Hebrew (he)</option>
      <option value="hi">Hindi (hi)</option>
      <option value="th">Thai (th)</option>
    </optgroup>
    <optgroup label="ServiceNow Special Codes">
      <option value="fq">French Canada (fq → fr-CA)</option>
      <option value="zt">Chinese Traditional (zt → zh-Hant)</option>
      <option value="pb">Portuguese Brazil (pb → pt-BR)</option>
    </optgroup>
  </select>

  <button id="scanBtn">🔍 Scan this page</button>
  <button id="clearBtn">Clear highlights</button>

  <div id="status"></div>
  <div id="issuesList"></div>

  <hr class="divider">

  <div id="refTable"></div>

  <hr class="divider">
  <div class="help">
    Scans DOM text, SVG chart labels (Highcharts), shadow DOM, and same-origin iframes.
    Detects English month/day names in non-English locales and wrong date order.
  </div>

  <script src="popup.js"></script>
</body>
</html>
